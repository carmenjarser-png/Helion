<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Helion</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.45);
    --lock-color: #a8e6cf;
    --unlock-color: #ffd3b6;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; max-width: 420px; margin: 0 auto; padding-bottom: 60px; min-height: 100vh; }
  .screen.active { display: block; }

  /* ── WELCOME ── */
  #screen-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 28px;
    min-height: 100vh;
    gap: 0;
  }
  #screen-welcome.active { display: flex; }

  .welcome-dot {
    width: 10px; height: 10px;
    background: var(--lock-color);
    border-radius: 50%;
    margin-bottom: 20px;
  }
  .welcome-title {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -0.04em;
    color: var(--text);
    margin-bottom: 8px;
    text-align: center;
  }
  .welcome-sub {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 64px;
    text-align: center;
  }
  .welcome-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
  }
  .welcome-card {
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .welcome-card:hover { border-color: rgba(255,255,255,0.22); background: #1a1a1a; }
  .welcome-card:active { transform: scale(0.98); }
  .welcome-card-left { display: flex; flex-direction: column; gap: 4px; }
  .welcome-card-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .welcome-card-tag.lock { color: var(--lock-color); }
  .welcome-card-tag.unlock { color: var(--unlock-color); }
  .welcome-card-label {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  .welcome-card-arrow {
    width: 36px; height: 36px;
    border: 0.5px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 16px;
    color: var(--text-muted);
  }
  .welcome-lang {
    margin-top: 48px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lang-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .lang-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 600; }

  /* ── INSTRUCTIONS SCREEN ── */
  .inst-header {
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .back-btn {
    width: 36px; height: 36px;
    border: 0.5px solid var(--border);
    border-radius: 50%;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
  .inst-header-text { display: flex; flex-direction: column; gap: 2px; }
  .inst-section-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .inst-section-tag.lock { color: var(--lock-color); }
  .inst-section-tag.unlock { color: var(--unlock-color); }
  .inst-section-title {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: -0.03em;
  }

  /* Steps */
  .steps {
    padding: 20px 24px 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .step {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.2s;
  }
  .step:hover { border-color: rgba(255,255,255,0.16); }
  .step-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: contain;
    border-radius: 8px;
  }
  .step-num {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-muted);
  }
  .step-text {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.45;
    color: var(--text);
  }
  .footer-note {
    padding: 28px 24px 0;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    line-height: 1.6;
  }
</style>
</head>
<body>

<!-- ══ WELCOME SCREEN ══ -->
<div id="screen-welcome" class="screen active">
  <div class="welcome-dot"></div>
  <div class="welcome-title">Helion</div>
  <div class="welcome-sub" id="w-sub">Sistema de aparcamiento</div>

  <div class="welcome-cards">
    <div class="welcome-card" onclick="goTo('lock')">
      <div class="welcome-card-left">
        <div class="welcome-card-tag lock" id="w-tag-lock">BLOQUEAR</div>
        <div class="welcome-card-label" id="w-label-lock">Cómo bloquear</div>
      </div>
      <div class="welcome-card-arrow">→</div>
    </div>
    <div class="welcome-card" onclick="goTo('unlock')">
      <div class="welcome-card-left">
        <div class="welcome-card-tag unlock" id="w-tag-unlock">DESBLOQUEAR</div>
        <div class="welcome-card-label" id="w-label-unlock">Cómo desbloquear</div>
      </div>
      <div class="welcome-card-arrow">→</div>
    </div>
  </div>

  <div class="welcome-lang">
    <button class="lang-btn active" onclick="setLang('es',this)">ES</button>
    <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    <button class="lang-btn" onclick="setLang('fr',this)">FR</button>
    <button class="lang-btn" onclick="setLang('de',this)">DE</button>
    <button class="lang-btn" onclick="setLang('it',this)">IT</button>
  </div>
</div>

<!-- ══ LOCK SCREEN ══ -->
<div id="screen-lock" class="screen">
  <div class="inst-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="inst-header-text">
      <div class="inst-section-tag lock" id="l-tag">BLOQUEAR</div>
      <div class="inst-section-title" id="l-title">Cómo bloquear</div>
    </div>
  </div>
  <div class="steps" id="steps-lock"></div>
  <div class="footer-note" id="l-footer">Ante cualquier problema, contacta con el servicio técnico.</div>
</div>

<!-- ══ UNLOCK SCREEN ══ -->
<div id="screen-unlock" class="screen">
  <div class="inst-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="inst-header-text">
      <div class="inst-section-tag unlock" id="u-tag">DESBLOQUEAR</div>
      <div class="inst-section-title" id="u-title">Cómo desbloquear</div>
    </div>
  </div>
  <div class="steps" id="steps-unlock"></div>
  <div class="footer-note" id="u-footer">Ante cualquier problema, contacta con el servicio técnico.</div>
</div>

const lockImgs   = [img1, img2, img3, img4, img5, img6, img7, img8];
const unlockImgs = [img9, img10, img11, img12];

let currentLang = 'es';

function makeStep(text, imgSrc, idx) {
  return `<div class="step">
    <img class="step-img" src="${imgSrc}" alt="Paso ${idx+1}"/>
    <div class="step-num">${String(idx+1).padStart(2,'0')}</div>
    <div class="step-text">${text}</div>
  </div>`;
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const d = content[lang];
  document.documentElement.lang = lang;

  // Welcome
  document.getElementById('w-sub').textContent = d.sub;
  document.getElementById('w-tag-lock').textContent = d.wTagLock;
  document.getElementById('w-label-lock').textContent = d.wLabelLock;
  document.getElementById('w-tag-unlock').textContent = d.wTagUnlock;
  document.getElementById('w-label-unlock').textContent = d.wLabelUnlock;

  // Lock screen
  document.getElementById('l-tag').textContent = d.lTag;
  document.getElementById('l-title').textContent = d.lTitle;
  document.getElementById('l-footer').textContent = d.footer;
  document.getElementById('steps-lock').innerHTML = d.lock.map((t,i) => makeStep(t, lockImgs[i], i)).join('');

  // Unlock screen
  document.getElementById('u-tag').textContent = d.uTag;
  document.getElementById('u-title').textContent = d.uTitle;
  document.getElementById('u-footer').textContent = d.footer;
  document.getElementById('steps-unlock').innerHTML = d.unlock.map((t,i) => makeStep(t, unlockImgs[i], i)).join('');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function goTo(section) {
  showScreen(section);
}

function goBack() {
  showScreen('welcome');
}

setLang('es', null);
